<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frank & Olive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>:root { --api: "https://script.google.com/macros/s/AKfycbxXczdc02AvL4wxw3wvE2Z_ZeYrwpzEff7yADI42RWeHcvv3D3PUdPwIqfKaHgiw1h7/exec"; --rose: #D4526E; --rose-hover: #b8435c; --rose-pale: #FDF2F5; --rose-light: #F4B8C6; --gold: #B8892A; --gold-light: #F0D898; --gold-pale: #FDFAF0; --choc: #2C1810; --choc-mid: #5C3420; --cream: #FAF7F2; --mint: #3A9E85; --mint-light: #C2EAE0; --white: #FFFFFF; --border: rgba(44,24,16,0.09); --text: #1E0F08; --text-soft: #7A5848; --shadow: 0 2px 20px rgba(44,24,16,0.07); --shadow-md: 0 6px 32px rgba(44,24,16,0.11); --shadow-lg: 0 16px 56px rgba(44,24,16,0.15); --radius: 14px; } * { margin:0; padding:0; box-sizing:border-box; } body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; }  .sidebar { width: 230px; background: var(--choc); min-height: 100vh; position: fixed; left:0; top:0; display: flex; flex-direction: column; z-index: 50; } .sb-brand { padding: 28px 22px 22px; border-bottom: 1px solid rgba(255,255,255,0.07); } .sb-logo { font-size: 30px; margin-bottom: 8px; } .sb-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold-light); line-height: 1.15; font-weight: 600; } .sb-tagline { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; } .sb-nav { padding: 18px 10px; flex:1; } .sb-section { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 12px 5px; } .sb-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 13.5px; font-weight: 500; margin-bottom: 2px; transition: all 0.18s; position: relative; } .sb-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); } .sb-item.active { background: var(--rose); color: #fff; } .sb-item .si { font-size: 15px; width: 20px; text-align: center; } .sb-badge { margin-left: auto; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 20px; } .sb-item.active .sb-badge { background: rgba(255,255,255,0.25); } .sb-badge.alert { background: #FF4D6A; color: white; } .sb-footer { padding: 16px 22px; font-size: 11px; color: rgba(255,255,255,0.2); border-top: 1px solid rgba(255,255,255,0.06); } .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); margin-right: 5px; animation: pulse 2s infinite; } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} } .main { margin-left: 230px; flex:1; padding: 30px 32px; } .page { display:none; animation: fadeUp 0.3s ease; } .page.active { display: block; } @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } } .ph { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 26px; } .ph-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 700; color: var(--choc); line-height: 1; } .ph-sub { font-size: 13px; color: var(--text-soft); margin-top: 5px; } .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Outfit', sans-serif; transition: all 0.18s; letter-spacing: 0.01em; } .btn-primary { background: var(--rose); color: #fff; } .btn-primary:hover { background: var(--rose-hover); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(212,82,110,0.35); } .btn-ghost { background: transparent; color: var(--choc); border: 1.5px solid var(--border); } .btn-ghost:hover { border-color: var(--rose); color: var(--rose); } .btn-green { background: var(--mint); color: #fff; } .btn-green:hover { background: #2e8870; transform: translateY(-1px); } .btn-row { display:flex; gap:10px; align-items:center; } .alert-bar { background: linear-gradient(135deg, #FFF8E7, #FFEFCO); border: 1.5px solid var(--gold-light); border-radius: 12px; padding: 13px 18px; display: flex; align-items: center; gap: 10px; margin-bottom: 22px; font-size: 13.5px; color: var(--choc-mid); } .alert-bar.hidden { display: none; } .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; } .stat { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); position: relative; overflow: hidden; } .stat::after { content:''; position: absolute; bottom:-18px; right:-18px; width: 70px; height: 70px; border-radius: 50%; opacity: 0.06; } .stat.s1::after { background: var(--rose); } .stat.s2::after { background: var(--gold); } .stat.s3::after { background: var(--mint); } .stat.s4::after { background: var(--choc); } .stat-icon { font-size: 20px; margin-bottom: 10px; } .stat-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 5px; } .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; color: var(--choc); line-height:1; } .stat-note { font-size: 11px; color: var(--mint); margin-top: 5px; font-weight: 500; } .stat-note.warn { color: var(--rose); } .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; } .card { background: var(--white); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); } .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; } .card-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--choc); } .card-link { font-size: 12px; color: var(--rose); cursor: pointer; font-weight: 600; }  .loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--text-soft); gap: 12px; font-size: 14px; } .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.7s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } } .overlay { display: none; position: fixed; inset:0; background: rgba(44,24,16,0.5); z-index: 200; align-items: center; justify-content: center; } .overlay.open { display:flex; } .modal { background: var(--white); border-radius: 18px; padding: 30px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); } .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; margin-bottom: 22px; color: var(--choc); } .form-group { margin-bottom: 15px; } .form-label { display:block; font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--text-soft); margin-bottom:5px; } .form-input, .form-select { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13.5px; font-family: 'Outfit', sans-serif; color: var(--text); background: var(--white); outline: none; transition: border-color 0.15s; } .form-input:focus, .form-select:focus { border-color: var(--rose); } .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; } .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; } .form-hint { background: var(--rose-pale); border-radius: 9px; padding: 11px 14px; font-size:12.5px; color: var(--text-soft); margin-top:6px; } .toast { position: fixed; bottom: 28px; right: 28px; background: var(--choc); color: #fff; padding: 13px 20px; border-radius: 12px; font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; } .toast.show { transform: translateY(0); opacity:1; }</style>
</head>
<body>
<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">🍬</div>
    <div class="sb-name">Frank &amp;<br>Olive</div>
    <div class="sb-tagline">Luxury Confectioners</div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">Dashboard</div>
    <div class="sb-item active" onclick="nav('dashboard')"><span class="si">📊</span>Dashboard</div>
  </div>
</nav>
<main class="main">
  <div id="pg-dashboard" class="page active">
    <div class="ph"><div><div class="ph-title">Dashboard</div><div class="ph-sub">Welcome to Frank & Olive management system</div></div></div>
    <div class="stats"><div class="stat s1"><div class="stat-icon">📊</div><div class="stat-lbl">Total Orders</div><div class="stat-val">--</div></div><div class="stat s2"><div class="stat-icon">📦</div><div class="stat-lbl">Items in Stock</div><div class="stat-val">--</div></div><div class="stat s3"><div class="stat-icon">💰</div><div class="stat-lbl">Revenue</div><div class="stat-val">--</div></div><div class="stat s4"><div class="stat-icon">🎯</div><div class="stat-lbl">Upcoming</div><div class="stat-val">--</div></div></div>
  </div>
</main>
<script>function nav(page) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('pg-' + page)?.classList.add('active'); }</script>
</body>
</html>
